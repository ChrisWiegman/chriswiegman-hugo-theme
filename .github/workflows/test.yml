name: Run End-to-end tests with Playwright

on:
    push:
        branches: ["**"]
    workflow_call:

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Hugo
              run: |
                  HUGO_VERSION=$(curl -s https://api.github.com/repos/gohugoio/hugo/releases/latest | jq -r '.tag_name' | sed 's/v//')
                  wget -O /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
                  tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo

            - name: Cache Hugo resources
              uses: actions/cache@v5
              with:
                  path: |
                      dev/resources
                  key: ${{ runner.os }}-hugo-resources-${{ hashFiles('**/go.mod', '**/go.sum', '**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock', 'hugo.toml', 'hugo.yaml', 'hugo.json', 'config/**', 'assets/**') }}
                  restore-keys: |
                      ${{ runner.os }}-hugo-resources-

            - name: Prepare Hugo cache directory
              run: mkdir -p .hugo_cache

            - name: Cache Hugo cacheDir
              uses: actions/cache@v5
              with:
                  path: |
                      .hugo_cache
                  key: ${{ runner.os }}-hugo-cachedir-${{ hashFiles('**/go.mod', '**/go.sum', 'hugo.toml', 'hugo.yaml', 'hugo.json', 'config/**') }}
                  restore-keys: |
                      ${{ runner.os }}-hugo-cachedir-

            - name: Set up Node (with npm cache)
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Prepare Playwright browser cache
              run: mkdir -p ~/.cache/ms-playwright

            - name: Cache Playwright browsers
              uses: actions/cache@v5
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

            - name: Setup Playwright for testing
              run: npx playwright install chromium
              env:
                  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

            - name: Run Playwright tests
              run: npm run e2e
              env:
                  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

            - name: Upload Playwright artifacts on failure
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-artifacts
                  path: |
                      test-results
                      playwright-report
