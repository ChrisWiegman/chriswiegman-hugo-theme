<nav class="content-categories" aria-label="Category filters">
    <p class="categories-label">Filter Posts:</p>
    <ul class="categories">
        <li><a href="/blog" class="category">All Posts</a></li>
        {{ range $name, $taxonomy := .Site.Taxonomies.categories }}
        <li><a href="/categories/{{ $name }}/" class="category">{{ title $name }}</a></li>
        {{- end }}
    </ul>
</nav>
