{{- $post := .post -}}
{{- $dateFormat := .dateFormat | default "Jan 2" -}}
{{- $isDraft := .isDraft | default false -}}
<a class="post{{ if $isDraft }} post--draft{{ end }}" href="{{ $post.RelPermalink }}">
    <h3 class="post-title">{{ if $isDraft }}[DRAFT] {{ end }}{{ $post.Title }}</h3> <span class="post-day">{{ if $post.Date.IsZero }}—{{ else }}{{ dateFormat $dateFormat $post.Date }}{{ end }}</span>
</a>
