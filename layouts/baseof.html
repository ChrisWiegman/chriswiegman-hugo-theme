<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
    {{ partial "head.html" . }}
</head>

<body class="{{ .Kind }}">
    <a class="skip-link" href="#main">Skip to main content</a>
    <header>
        {{ partial "header.html" . }}
    </header>
    <main id="main">
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        {{ partial "footer.html" . }}
    </footer>
</body>

</html>
